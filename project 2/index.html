<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, rgb(255, 0, 150), rgb(0, 204, 255));
      }
      .content {
        padding: 30px;
        width: 350px;
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }
      .content h2 {
        padding-bottom: 20px;
        font-size: 30px;
        color: blueviolet;
        letter-spacing: 2px;
      }
      input,
      textarea {
        width: 100%;
        padding: 12px 15px;
        border-radius: 13px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        outline: none;
        font-size: 14px;
        transition: 0.3s ease;
      }
      textarea {
        height: 140px;
      }
      .form-content input:focus,
      .form-content textarea:focus {
        border-color: #6c63ff;
        box-shadow: 0 0 8px rgba(108, 99, 255, 0.3);
      }
      button {
        width: 100%;
        padding: 12px 20px;
        border: 1px solid;
        border-radius: 12px;
        background: #6c63ff;
        font-size: 20px;
        color: white;
        letter-spacing: 5px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
      }
      button:hover {
        color: black;
        background-color: white;
      }
      .form-content button:hover {
        box-shadow: 0 0 15px rgba(108, 99, 255, 0.6);
      }
      .form-content button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h2>GET IN TOUCH!</h2>
      <form
        action="https://api.web3forms.com/submit"
        method="POST"
        class="form-content"
      >
        <input type="hidden" name="access_key" value="1f097bb0-7b2d-4a6b-ad60-9de4d16cdf73" />
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <textarea name="message" placeholder="Your Message"></textarea>
        <button type="submit">SUBMIT</button>
      </form>
    </div>
  </body>
</html>
